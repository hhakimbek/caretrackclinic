<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card">
      <h1>CareTrack Clinic</h1>
      <p class="login-subtitle">Medical Record Management System</p>

      <form class="login-form" id="loginForm">
        <label for="fullName">Full Name (register uchun)</label>
        <input type="text" id="fullName" placeholder="John Doe">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@caretrack.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="">Select role</option>
          <option>Administrator</option>
          <option>Clinician</option>
          <option>Receptionist</option>
        </select>

        <button class="btn btn-primary btn-full" type="submit">Login</button>
        <button class="btn btn-outline btn-full" type="button" id="registerBtn">Register</button>
      </form>

      <p class="small-note">Agar login topilmasa, avval register qiling.</p>
    </section>
  </main>
</body>
<script src="script.js"></script>
</html>
